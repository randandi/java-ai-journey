spring:
    application:
      name: hello-spring-ai
    ai:
      openai:
        # DeepSeek 兼容 OpenAI 协议
        base-url: https://api.deepseek.com
        api-key: ${DEEPSEEK_KEY}
        chat:
          options:
            model: deepseek-chat
            temperature: 0.7
    server:
      port: 8080
    logging:
      level:
        org.springframework.ai: DEBUG